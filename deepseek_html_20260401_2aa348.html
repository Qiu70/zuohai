    // 时间格式化：将Excel序列号（如46174）转换为年月，保留文本时间
    function formatTime(timeStr) {
        if (!timeStr) return '待定';
        let str = timeStr.toString().trim();
        // 如果已经是可读文本（包含年、月、-等），直接返回
        if (str.includes('年') || str.includes('-') || str.includes('月')) {
            return str;
        }
        // 如果是纯数字（Excel序列号）
        if (/^\d+$/.test(str) && str.length >= 5) {
            const serial = parseInt(str, 10);
            // Excel序列号基准：1900-01-01 = 1，但需注意Excel误将1900年视为闰年，实际1900-03-01之后可正常推算
            // 简单做法：序列号 - 1 得到从1900-01-01开始的天数
            const date = new Date(1900, 0, serial - 1); // 月份从0开始
            if (!isNaN(date.getTime())) {
                const year = date.getFullYear();
                const month = date.getMonth() + 1;
                return `${year}年${month}月`;
            }
        }
        return str;
    }

    // 分组
    function groupByCategory(data) {
        const map = new Map();
        data.forEach(item => {
            const cat = item.category;
            if (!map.has(cat)) map.set(cat, []);
            map.get(cat).push(item);
        });
        const order = ["供应链类", "载体类", "配套服务类"];
        const sorted = Array.from(map.entries()).sort((a,b) => order.indexOf(a[0]) - order.indexOf(b[0]));
        return sorted;
    }

    const grouped = groupByCategory(procurementData);
    const container = document.getElementById("procurementContainer");

    function renderCards() {
        let html = '';
        grouped.forEach(([category, items]) => {
            const total = items.length;
            const defaultShow = 3;
            const showExpand = total > defaultShow;
            let itemsHtml = '';
            items.forEach((item, idx) => {
                const hiddenClass = idx >= defaultShow ? 'hidden' : '';
                const amountStr = item.amount !== undefined ? `${item.amount}万元` : '—';
                const formattedTime = formatTime(item.time);
                itemsHtml += `
                    <div class="procurement-item ${hiddenClass}" data-category="${category}" data-idx="${idx}">
                        <div class="item-title">
                            <span>${item.name}</span>
                            <span class="item-amount"><i class="fas fa-yen-sign"></i> ${amountStr}</span>
                        </div>
                        <div class="item-desc">${item.content}</div>
                        <div class="item-meta">
                            <span class="meta-tag"><i class="fas fa-building"></i> ${item.company}</span>
                            <span class="meta-tag"><i class="fas fa-user"></i> ${item.contact}</span>
                            <span class="meta-tag"><i class="far fa-calendar-alt"></i> 计划采购: ${formattedTime}</span>
                        </div>
                    </div>
                `;
            });
            const expandBtnHtml = showExpand ? `
                <div class="expand-btn" data-category="${category}">
                    <i class="fas fa-chevron-down"></i> 展开全部 (${total}条)
                </div>
            ` : '';
            html += `
                <div class="category-card" data-category="${category}">
                    <div class="card-header">
                        <div class="category-title">
                            <i class="fas fa-folder-open"></i> ${category}
                            <span class="category-count">${total}项采购</span>
                        </div>
                    </div>
                    <div class="procurement-list">
                        ${itemsHtml}
                    </div>
                    ${expandBtnHtml}
                </div>
            `;
        });
        container.innerHTML = html;

        // 绑定展开按钮事件
        document.querySelectorAll('.expand-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const cat = btn.getAttribute('data-category');
                const card = document.querySelector(`.category-card[data-category="${cat}"]`);
                const hiddenItems = card.querySelectorAll('.procurement-item.hidden');
                if (hiddenItems.length) {
                    hiddenItems.forEach(item => item.classList.remove('hidden'));
                    btn.innerHTML = '<i class="fas fa-chevron-up"></i> 收起';
                } else {
                    const allItems = card.querySelectorAll('.procurement-item');
                    allItems.forEach((item, idx) => {
                        if (idx >= 3) item.classList.add('hidden');
                    });
                    btn.innerHTML = '<i class="fas fa-chevron-down"></i> 展开全部';
                }
            });
        });
    }
