    // 分组函数
    function groupByCategory(data) {
        const map = new Map();
        data.forEach(item => {
            const cat = item.category;
            if (!map.has(cat)) map.set(cat, []);
            map.get(cat).push(item);
        });
        // 按自定义顺序排序
        const order = ["人才支持与服务保障", "产业升级与科技创新", "出海服务与对外开放", "金融服务与基金投资", "订单开放与供应链提质", "政务与营商环境支持", "其他政策", "两国双园专项"];
        const sorted = Array.from(map.entries()).sort((a,b) => {
            let idxA = order.indexOf(a[0]);
            let idxB = order.indexOf(b[0]);
            if (idxA === -1) idxA = 999;
            if (idxB === -1) idxB = 999;
            return idxA - idxB;
        });
        return sorted;
    }

    const grouped = groupByCategory(policiesRaw);
    const container = document.getElementById("policyContainer");
    
    // 渲染每个分类卡片，初始显示前3条
    function renderCards() {
        let html = '';
        grouped.forEach(([category, items]) => {
            const total = items.length;
            const defaultShow = 3; // 默认显示条数
            const showExpand = total > defaultShow;
            // 生成政策列表HTML，前3条可见，其余隐藏
            let policyHtml = '';
            items.forEach((item, idx) => {
                const hiddenClass = idx >= defaultShow ? 'hidden' : '';
                policyHtml += `
                    <div class="policy-item ${hiddenClass}" data-category="${category}" data-idx="${idx}">
                        <div class="policy-content">${item.content}</div>
                        <div class="policy-meta">
                            <span class="meta-tag"><i class="fas fa-building"></i> ${item.owner}</span>
                            <span class="meta-tag"><i class="fas fa-check-circle"></i> ${item.applicable}</span>
                        </div>
                    </div>
                `;
            });
            const expandBtnHtml = showExpand ? `
                <div class="expand-btn" data-category="${category}">
                    <i class="fas fa-chevron-down"></i> 展开全部 (${total}条)
                </div>
            ` : '';
            html += `
                <div class="category-card" data-category="${category}">
                    <div class="card-header">
                        <div class="category-title">
                            <i class="fas fa-folder-open"></i> ${category}
                            <span class="category-count">${total}条政策</span>
                        </div>
                    </div>
                    <div class="policy-list">
                        ${policyHtml}
                    </div>
                    ${expandBtnHtml}
                </div>
            `;
        });
        container.innerHTML = html;
        
        // 绑定展开按钮事件
        document.querySelectorAll('.expand-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const cat = btn.getAttribute('data-category');
                const card = document.querySelector(`.category-card[data-category="${cat}"]`);
                const hiddenItems = card.querySelectorAll('.policy-item.hidden');
                if (hiddenItems.length) {
                    hiddenItems.forEach(item => item.classList.remove('hidden'));
                    btn.innerHTML = '<i class="fas fa-chevron-up"></i> 收起';
                } else {
                    // 收起：除了前3条都隐藏
                    const allItems = card.querySelectorAll('.policy-item');
                    allItems.forEach((item, idx) => {
                        if (idx >= 3) item.classList.add('hidden');
                    });
                    btn.innerHTML = '<i class="fas fa-chevron-down"></i> 展开全部';
                }
            });
        });
    }
    
    renderCards();
</script>
