    // 时间格式化
    function formatTime(timeStr) {
        if (!timeStr) return '待定';
        let str = timeStr.toString().trim();
        if (str.includes('年') || str.includes('-') || str.includes('月')) return str;
        if (/^\d+$/.test(str) && str.length >= 5) {
            const serial = parseInt(str,10);
            const date = new Date(1900,0, serial -1);
            if (!isNaN(date.getTime())) return `${date.getFullYear()}年${date.getMonth()+1}月`;
        }
        return str;
    }

    // 渲染场景模块
    let currentScenarioFilter = "all";
    function renderScenario() {
        let filtered = projectsData;
        if (currentScenarioFilter !== "all") {
            filtered = projectsData.filter(p => p.industry.toLowerCase().includes(currentScenarioFilter.toLowerCase()) || p.name.toLowerCase().includes(currentScenarioFilter.toLowerCase()));
        }
        const container = document.getElementById("dynamicContainer");
        if (!filtered.length) { container.innerHTML = `<div class="empty-state"><i class="fas fa-filter"></i><p>暂无匹配项目</p></div>`; return; }
        let html = "";
        filtered.forEach(p => {
            html += `<div class="project-card">
                        <div class="card-header"><div class="project-title">${p.name}</div><div class="industry-tag">${p.industry.split(',')[0]}</div></div>
                        <div class="card-meta"><span class="meta-item"><i class="fas fa-map-marker-alt"></i> ${p.district}</span><span class="meta-item"><i class="fas fa-chart-line"></i> ${p.investment}亿元</span><span class="meta-item"><i class="fas fa-building"></i> ${p.owner}</span></div>
                        <div class="section-block"><div class="section-label"><i class="fas fa-align-left"></i> 场景描述</div><div class="desc-text">${p.desc}</div></div>
                        <div class="section-block"><div class="section-label"><i class="fas fa-handshake"></i> 合作需求</div><div class="coop-text">${p.cooperation}</div></div>
                        <div class="card-footer"><div class="contact-info"><i class="fas fa-phone-alt"></i> ${p.contact}</div><div class="validity-badge">${p.validityRaw}</div></div>
                      </div>`;
        });
        container.innerHTML = html;
    }

    // 渲染政策模块（带展开收起）
    let currentPolicyFilter = "all";
    function renderPolicy() {
        let filtered = policiesRaw;
        if (currentPolicyFilter !== "all") filtered = policiesRaw.filter(p => p.category === currentPolicyFilter);
        const container = document.getElementById("dynamicContainer");
        if (!filtered.length) { container.innerHTML = `<div class="empty-state"><i class="fas fa-filter"></i><p>暂无匹配政策</p></div>`; return; }
        const map = new Map();
        filtered.forEach(p => { if(!map.has(p.category)) map.set(p.category, []); map.get(p.category).push(p); });
        let html = "";
        for (let [cat, items] of map.entries()) {
            const total = items.length;
            html += `<div class="policy-card" data-category="${cat}"><div class="card-header"><div class="card-title">${cat}</div><div class="cat-badge">${total}条</div></div><div class="procurement-list">`;
            items.forEach((item, idx) => {
                const hidden = idx >= 3 ? 'hidden' : '';
                html += `<div class="procurement-item ${hidden}"><div class="policy-detail" style="margin-bottom:6px;">${item.content}</div><div class="meta-row" style="padding:0"><div class="meta-tag"><i class="fas fa-building"></i> ${item.owner}</div><div class="meta-tag"><i class="fas fa-check-circle"></i> ${item.applicable}</div></div></div>`;
            });
            html += `</div>${total > 3 ? `<div class="expand-btn" data-category-expand="${cat}"><i class="fas fa-chevron-down"></i> 展开全部 (${total}条)</div>` : ''}</div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll('[data-category-expand]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const cat = btn.getAttribute('data-category-expand');
                const card = document.querySelector(`.policy-card[data-category="${cat}"]`);
                const hiddenItems = card.querySelectorAll('.procurement-item.hidden');
                if (hiddenItems.length) {
                    hiddenItems.forEach(i => i.classList.remove('hidden'));
                    btn.innerHTML = '<i class="fas fa-chevron-up"></i> 收起';
                } else {
                    card.querySelectorAll('.procurement-item').forEach((item, idx) => { if(idx >= 3) item.classList.add('hidden'); });
                    btn.innerHTML = '<i class="fas fa-chevron-down"></i> 展开全部';
                }
            });
        });
    }

    // 渲染采购模块（带展开收起）
    function renderProcurement() {
        const map = new Map();
        procurementData.forEach(p => { if(!map.has(p.category)) map.set(p.category, []); map.get(p.category).push(p); });
        const order = ["供应链类","载体类","配套服务类"];
        const sorted = Array.from(map.entries()).sort((a,b)=> order.indexOf(a[0])-order.indexOf(b[0]));
        const container = document.getElementById("dynamicContainer");
        let html = "";
        for (let [cat, items] of sorted) {
            const total = items.length;
            html += `<div class="procurement-card" data-category-proc="${cat}"><div class="card-header"><div class="card-title">${cat}</div><div class="cat-badge">${total}项</div></div><div class="procurement-list">`;
            items.forEach((item, idx) => {
                const hidden = idx >= 3 ? 'hidden' : '';
                const amountStr = item.amount ? `${item.amount}万元` : '—';
                html += `<div class="procurement-item ${hidden}">
                            <div class="item-title">
                                <span>${item.name}</span>
                                <span class="item-amount"><i class="fas fa-yen-sign"></i> ${amountStr}</span>
                            </div>
                            <div class="item-desc">${item.content}</div>
                            <div class="item-meta">
                                <span class="meta-tag"><i class="fas fa-building"></i> ${item.company}</span>
                                <span class="meta-tag"><i class="fas fa-user"></i> ${item.contact}</span>
                                <span class="meta-tag"><i class="far fa-calendar-alt"></i> ${formatTime(item.time)}</span>
                            </div>
                          </div>`;
            });
            html += `</div>${total > 3 ? `<div class="expand-btn" data-category-proc-expand="${cat}"><i class="fas fa-chevron-down"></i> 展开全部 (${total}条)</div>` : ''}</div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll('[data-category-proc-expand]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const cat = btn.getAttribute('data-category-proc-expand');
                const card = document.querySelector(`.procurement-card[data-category-proc="${cat}"]`);
                const hiddenItems = card.querySelectorAll('.procurement-item.hidden');
                if (hiddenItems.length) {
                    hiddenItems.forEach(i => i.classList.remove('hidden'));
                    btn.innerHTML = '<i class="fas fa-chevron-up"></i> 收起';
                } else {
                    card.querySelectorAll('.procurement-item').forEach((item, idx) => { if(idx >= 3) item.classList.add('hidden'); });
                    btn.innerHTML = '<i class="fas fa-chevron-down"></i> 展开全部';
                }
            });
        });
    }

    // 全局Tab切换
    let activeTab = "scenario";
    function switchTab(tab) {
        activeTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
        const scenarioFilterDiv = document.getElementById("scenarioFilterWrapper");
        const policyFilterDiv = document.getElementById("policyFilterWrapper");
        if (tab === "scenario") {
            scenarioFilterDiv.style.display = "block";
            policyFilterDiv.style.display = "none";
            renderScenario();
        } else if (tab === "policy") {
            scenarioFilterDiv.style.display = "none";
            policyFilterDiv.style.display = "block";
            renderPolicy();
        } else {
            scenarioFilterDiv.style.display = "none";
            policyFilterDiv.style.display = "none";
            renderProcurement();
        }
    }

    // 绑定筛选
    function bindScenarioFilters() {
        const chips = document.querySelectorAll("#scenarioFilterGroup .filter-chip");
        chips.forEach(chip => {
            chip.addEventListener("click", () => {
                if (activeTab !== "scenario") return;
                chips.forEach(c => c.classList.remove("active"));
                chip.classList.add("active");
                currentScenarioFilter = chip.getAttribute("data-filter");
                renderScenario();
            });
        });
    }
    function bindPolicyFilters() {
        const chips = document.querySelectorAll("#policyFilterGroup .filter-chip");
        chips.forEach(chip => {
            chip.addEventListener("click", () => {
                if (activeTab !== "policy") return;
                chips.forEach(c => c.classList.remove("active"));
                chip.classList.add("active");
                currentPolicyFilter = chip.getAttribute("data-filter");
                renderPolicy();
            });
        });
    }

    // 初始化
    document.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", (e) => {
            switchTab(tab.getAttribute("data-tab"));
        });
    });
    bindScenarioFilters();
    bindPolicyFilters();
    switchTab("scenario");
</script>
