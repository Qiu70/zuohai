        if (str.includes("-") && str.includes(":")) {
            let datePart = str.split(' ')[0];
            return `<span class="validity-badge"><i class="far fa-calendar-alt"></i> ${datePart}</span>`;
        }
        if (str.match(/\d{4}-\d{2}-\d{2}/)) {
            return `<span class="validity-badge"><i class="far fa-calendar-alt"></i> ${str}</span>`;
        }
        return `<span class="validity-badge">${str}</span>`;
    }

    // 提取行业简短显示（卡片头部使用）
    function getIndustryShort(industryStr) {
        if (!industryStr) return "其他";
        let main = industryStr.split(/[,，、]/)[0];
        if (main.length > 14) main = main.slice(0,12)+"..";
        return main;
    }

    // 检查项目是否符合筛选条件 (基于行业领域关键词)
    function matchFilter(project, filterKey) {
        if (filterKey === "all") return true;
        const industry = (project.industry || "").toLowerCase();
        const name = (project.name || "").toLowerCase();
        const cooperation = (project.cooperation || "").toLowerCase();
        // 根据筛选标签智能匹配
        if (filterKey === "新能源") {
            return industry.includes("新能源") || industry.includes("光伏") || name.includes("v2g") || name.includes("充电");
        }
        if (filterKey === "人工智能") {
            return industry.includes("人工智能") || industry.includes("ai") || name.includes("ai") || industry.includes("数字化") || project.name.includes("AI");
        }
        if (filterKey === "低空经济") {
            return industry.includes("低空经济") || name.includes("巡检") || project.desc.includes("无人机");
        }
        if (filterKey === "光伏") {
            return industry.includes("光伏") || name.includes("光伏");
        }
        if (filterKey === "港口") {
            return industry.includes("港口") || industry.includes("临港") || name.includes("港口") || name.includes("填海") || industry.includes("海洋经济");
        }
        if (filterKey === "海产品") {
            return industry.includes("海产品") || name.includes("海产品") || name.includes("东盟海产品");
        }
        if (filterKey === "智慧物业") {
            return industry.includes("智慧物业") || industry.includes("物业管理") || project.name.includes("产业园");
        }
        // 默认包含匹配
        return industry.includes(filterKey.toLowerCase());
    }

    // 渲染卡片列表
    function renderCards(filter = "all") {
        const container = document.getElementById("cardsContainer");
        if (!container) return;
        const filtered = projectsData.filter(proj => matchFilter(proj, filter));
        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-filter" style="font-size: 2rem; opacity: 0.5;"></i><p style="margin-top:12px">暂无匹配项目，试试其他筛选条件</p></div>`;
            return;
        }

        let cardsHtml = "";
        filtered.forEach(proj => {
            // 行业标签显示主领域
            const industryTag = getIndustryShort(proj.industry);
            const investHtml = formatInvestment(proj.investment);
            const validityHtml = formatValidity(proj.validityRaw);
            // 合作需求保留换行
            const cooperationHtml = proj.cooperation.replace(/\n/g, '<br>');
            const contactHtml = proj.contact.replace(/\n/g, '<br>');
            
            cardsHtml += `
                <div class="project-card">
                    <div class="card-header">
                        <div class="project-title">${proj.name}</div>
                        <div class="industry-tag"><i class="fas fa-hashtag"></i> ${industryTag}</div>
                    </div>
                    <div class="card-meta">
                        <span class="meta-item"><i class="fas fa-map-marker-alt"></i> ${proj.district}</span>
                        ${investHtml}
                        <span class="meta-item"><i class="fas fa-building"></i> ${proj.owner.length > 20 ? proj.owner.slice(0,18)+".." : proj.owner}</span>
                    </div>
                    <div class="section-block">
                        <div class="section-label"><i class="fas fa-align-left"></i> 场景描述</div>
                        <div class="desc-text">${proj.desc}</div>
                    </div>
                    <div class="section-block">
                        <div class="section-label"><i class="fas fa-handshake"></i> 合作需求</div>
                        <div class="coop-text">${cooperationHtml}</div>
                    </div>
                    <div class="card-footer">
                        <div class="contact-info">
                            <i class="fas fa-phone-alt"></i> ${contactHtml}
                        </div>
                        ${validityHtml}
                    </div>
                </div>
            `;
        });
        container.innerHTML = cardsHtml;
    }

    // 初始化筛选按钮事件
    function initFilters() {
        const filters = document.querySelectorAll("[data-filter]");
        filters.forEach(btn => {
            btn.addEventListener("click", function(e) {
                const filterVal = this.getAttribute("data-filter");
                // 更新激活样式
                filters.forEach(b => b.classList.remove("active"));
                this.classList.add("active");
                renderCards(filterVal);
            });
        });
    }

    // 页面加载渲染全部
    renderCards("all");
    initFilters();
</script>
</body>
</html>
